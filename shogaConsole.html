<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoga CLI Transmitter</title>
    <link id="dynamic-favicon" rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230c0c0c'/%3E%3Ctext x='2' y='12' fill='%2300ff00' font-family='monospace' font-size='12'%3E%3E%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg-color: #0c0c0c;
            --text-color: #cccccc;
            --accent-color: #00ff00;
            --error-color: #ff5555;
            --monitor-bg: #1a1a1a;
            --font-stack: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px;
        }

        #monitor-panel {
            flex: 0 0 85%;
            background-color: var(--monitor-bg);
            border-bottom: 2px solid #333;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 13px;
            color: #aaa;
            position: relative;
            overflow-anchor: none;
        }

        #status-float {
            position: sticky;
            top: 0;
            float: right;
            text-align: right;
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(2px);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            color: var(--accent-color);
            font-size: 11px;
            z-index: 100;
            margin-bottom: -25px;
        }

        #terminal-panel {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #000;
        }

        #log-area {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 12px;
        }

        .log-line.sys {
            color: #555;
        }

        .log-line.err {
            color: var(--error-color);
        }

        .log-line.success {
            color: var(--accent-color);
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 1px solid #333;
            padding-top: 8px;
        }

        .prompt {
            color: var(--accent-color);
            margin-right: 8px;
            font-weight: bold;
        }

        #cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: var(--font-stack);
            font-size: 14px;
            outline: none;
        }

        #cmd-input:disabled {
            cursor: not-allowed;
        }

        #json-viewer {
            padding-top: 10px;
            font-family: var(--font-stack);
        }

        #json-viewer::before {
            content: "{";
            display: block;
            color: #aaa;
        }

        #json-viewer::after {
            content: "}";
            display: block;
            color: #aaa;
        }

        .json-entry {
            margin-left: 20px;
            white-space: pre-wrap;
            color: #ccc;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
        }
    </style>
</head>

<body>

    <div id="monitor-panel">
        <div id="status-float">Connecting...</div>
        <div id="json-viewer">
            <div class="json-entry">"status": "Waiting for stream..."</div>
        </div>
    </div>

    <div id="terminal-panel">
        <div id="log-area">
            <div class="log-line sys">Shoga CLI Transmitter v1.3.0 initialized.</div>
            <div class="log-line sys">Mode: API Key Only (Anonymous)</div>
        </div>
        <div class="input-line">
            <span class="prompt">shoga@cli:~$</span>
            <input type="text" id="cmd-input" autocomplete="off" autofocus>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, query, limitToLast, orderByKey, endBefore, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const monitorPanel = document.getElementById('monitor-panel');
        const jsonViewer = document.getElementById('json-viewer');
        const statusFloat = document.getElementById('status-float');
        const logArea = document.getElementById('log-area');
        const cmdInput = document.getElementById('cmd-input');

        const sessionApiKey = sessionStorage.getItem('temp_console_api_key');
        const sessionNick = sessionStorage.getItem('temp_console_nick');
        const sessionRoomId = sessionStorage.getItem('temp_console_room_id');

        sessionStorage.removeItem('temp_console_api_key');
        sessionStorage.removeItem('temp_console_nick');
        sessionStorage.removeItem('temp_console_room_id');

        if (!sessionApiKey) {
            statusFloat.innerText = "MISSING API KEY";
            statusFloat.style.color = "#ff5555";
            const div = document.createElement('div');
            div.className = 'log-line err';
            div.innerText = "[System] Error: API Key is missing. Please login from index.html.";
            logArea.appendChild(div);
            throw new Error("API Key is missing");
        }

        const FIXED_NICK = sessionNick || "쇼가";
        const GLOBAL_ROOM_ID = sessionRoomId || "Laboratory";
        const firebaseConfig = {
            apiKey: sessionApiKey,
            authDomain: "shoga-intermediary.firebaseapp.com",
            databaseURL: "https://shoga-intermediary-default-rtdb.firebaseio.com",
            projectId: "shoga-intermediary",
            storageBucket: "shoga-intermediary.firebasestorage.app",
            messagingSenderId: "696629323825",
            appId: "1:696629323825:web:fede1b0d1dd1695afccd10",
            measurementId: "G-E4L52Z0HRE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let isInitialLoad = true;
        let oldestMessageKey = null;
        let isFirstLoadEvent = true;
        let isLoadingHistory = false;
        let hasMoreHistory = true;
        let isJsonViewerInitialized = false;

        const defaultFavicon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230c0c0c'/%3E%3Ctext x='2' y='12' fill='%2300ff00' font-family='monospace' font-size='12'%3E%3E%3C/text%3E%3C/svg%3E";
        const alertFavicon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230c0c0c'/%3E%3Ctext x='2' y='12' fill='%2300ff00' font-family='monospace' font-size='12'%3E%3E%3C/text%3E%3Ccircle cx='13' cy='3' r='3' fill='%23ff5555'/%3E%3C/svg%3E";

        function setFaviconAlert(showAlert) {
            const link = document.getElementById('dynamic-favicon');
            if (link) {
                link.href = showAlert ? alertFavicon : defaultFavicon;
            }
        }

        window.addEventListener('focus', () => setFaviconAlert(false));
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') setFaviconAlert(false);
        });

        function printLog(text, type = '') {
            const div = document.createElement('div');
            div.className = `log-line ${type}`;
            const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
            div.innerText = `[${time}] ${text}`;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        signInAnonymously(auth).catch((error) => {
            printLog(`Auth Failed: ${error.message}`, 'err');
            statusFloat.innerText = "AUTH ERROR";
            statusFloat.style.color = "#ff5555";
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                statusFloat.innerText = `● CONNECTED[${GLOBAL_ROOM_ID}]`;
                statusFloat.style.color = "#00ff00";
                printLog(`Connected to Firebase via API Key. Room: ${GLOBAL_ROOM_ID}`, 'sys');

                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }

                startMonitoring();
            } else {
                currentUser = null;
                statusFloat.innerText = "○ DISCONNECTED";
                statusFloat.style.color = "#555";
            }
        });

        function startMonitoring() {
            const roomRef = ref(db, `chats/${GLOBAL_ROOM_ID}`);
            const q = query(roomRef, limitToLast(500));

            get(q).then((snapshot) => {
                if (!snapshot.exists()) {
                    jsonViewer.innerHTML = '<div class="json-entry">"status": "Empty"</div>';
                    isJsonViewerInitialized = true;
                }
            });

            onChildAdded(q, (snapshot) => {
                const key = snapshot.key;
                const data = snapshot.val();

                if (isFirstLoadEvent) {
                    oldestMessageKey = key;
                    isFirstLoadEvent = false;
                }

                if (!isJsonViewerInitialized) {
                    jsonViewer.innerHTML = '';
                    isJsonViewerInitialized = true;
                }

                const div = document.createElement('div');
                div.className = 'json-entry';
                div.textContent = `"${key}": ${JSON.stringify(data, null, 2)},`;

                const isAtBottom = monitorPanel.scrollHeight - monitorPanel.scrollTop - monitorPanel.clientHeight <= 50;

                jsonViewer.appendChild(div);

                if (isAtBottom && !isLoadingHistory) {
                    monitorPanel.scrollTop = monitorPanel.scrollHeight;
                }

                if (!isInitialLoad) {
                    if (!data || (currentUser && data.uid === currentUser.uid)) return;

                    if (document.hidden) {
                        setFaviconAlert(true);

                        if ("Notification" in window && Notification.permission === "granted") {
                            const notification = new Notification(data.nick || "Unknown", {
                                body: data.text
                            });
                            notification.onclick = () => {
                                window.focus();
                                notification.close();
                            };
                        }
                    }
                }
            });

            setTimeout(() => {
                isInitialLoad = false;
            }, 2000);
        }

        monitorPanel.addEventListener('scroll', async () => {
            if (monitorPanel.scrollTop <= 5 && !isLoadingHistory && hasMoreHistory) {
                await loadMoreHistory();
            }
        });

        async function loadMoreHistory() {
            if (!oldestMessageKey || !hasMoreHistory || isLoadingHistory) return;
            isLoadingHistory = true;

            const oldScrollHeight = monitorPanel.scrollHeight;
            const currentScrollTop = monitorPanel.scrollTop;
            printLog("Loading older messages...", 'sys');

            try {
                const roomRef = ref(db, `chats/${GLOBAL_ROOM_ID}`);
                const q = query(roomRef, orderByKey(), endBefore(oldestMessageKey), limitToLast(500));
                const snapshot = await get(q);

                if (snapshot.exists()) {
                    const messages = [];
                    snapshot.forEach((childSnapshot) => {
                        messages.push({ key: childSnapshot.key, data: childSnapshot.val() });
                    });

                    if (messages.length > 0) {
                        oldestMessageKey = messages[0].key;

                        const fragment = document.createDocumentFragment();
                        messages.forEach((msgObj) => {
                            const div = document.createElement('div');
                            div.className = 'json-entry';
                            div.textContent = `"${msgObj.key}": ${JSON.stringify(msgObj.data, null, 2)},`;
                            fragment.appendChild(div);
                        });

                        jsonViewer.prepend(fragment);

                        monitorPanel.scrollTop = monitorPanel.scrollHeight - oldScrollHeight + currentScrollTop;

                        printLog(`Loaded ${messages.length} older messages.`, 'sys');
                    }

                    if (messages.length < 500) {
                        hasMoreHistory = false;
                        printLog("No more history to load.", 'sys');
                    }
                } else {
                    hasMoreHistory = false;
                    printLog("No more history to load.", 'sys');
                }
            } catch (e) {
                console.error("History load error", e);
                printLog(`History load error: ${e.message}`, 'err');
            }

            isLoadingHistory = false;
        }

        async function sendMessage(text) {
            if (!currentUser) return;

            const chatRef = ref(db, `chats/${GLOBAL_ROOM_ID}`);
            try {
                await push(chatRef, {
                    uid: currentUser.uid,
                    nick: FIXED_NICK,
                    text: text,
                    time: serverTimestamp()
                });
                printLog(`Sent: ${text}`, 'success');
            } catch (e) {
                printLog(`Error: ${e.message}`, 'err');
            }
        }

        cmdInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = cmdInput.value.trim();
                if (!val) return;

                if (val === '/clear') {
                    logArea.innerHTML = '';
                    printLog("Console cleared.", 'sys');
                    cmdInput.value = '';
                } else {
                    cmdInput.disabled = true;
                    cmdInput.style.opacity = '0.5';

                    await sendMessage(val);

                    cmdInput.value = '';
                    cmdInput.disabled = false;
                    cmdInput.style.opacity = '1';
                    cmdInput.focus();
                }
            }
        });

        document.body.addEventListener('click', () => {
            if (document.activeElement !== cmdInput) cmdInput.focus();
        });
    </script>
</body>

</html>
