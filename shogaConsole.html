<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoga CLI Transmitter</title>
    <link id="dynamic-favicon" rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230c0c0c'/%3E%3Ctext x='2' y='12' fill='%2300ff00' font-family='monospace' font-size='12'%3E%3E%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg-color: #0c0c0c;
            --text-color: #cccccc;
            --accent-color: #00ff00;
            --error-color: #ff5555;
            --monitor-bg: #1a1a1a;
            --font-stack: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px;
        }

        #monitor-panel {
            flex: 0 0 85%;
            background-color: var(--monitor-bg);
            border-bottom: 2px solid #333;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 13px;
            color: #aaa;
            position: relative;
            overflow-anchor: none;
        }

        #status-float {
            position: sticky;
            top: 0;
            float: right;
            text-align: right;
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(2px);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            color: var(--accent-color);
            font-size: 11px;
            z-index: 100;
            margin-bottom: -25px;
        }

        #terminal-panel {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #000;
        }

        #log-area {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 12px;
        }

        .log-line.sys {
            color: #555;
        }

        .log-line.err {
            color: var(--error-color);
        }

        .log-line.success {
            color: var(--accent-color);
        }

        .log-line.info {
            color: #4ca1af;
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 1px solid #333;
            padding-top: 8px;
        }

        .prompt {
            color: var(--accent-color);
            margin-right: 8px;
            font-weight: bold;
        }

        #cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: var(--font-stack);
            font-size: 14px;
            outline: none;
        }

        #cmd-input:disabled {
            cursor: not-allowed;
        }

        #json-viewer {
            padding-top: 10px;
            font-family: var(--font-stack);
        }

        #json-viewer::before {
            content: "{";
            display: block;
            color: #aaa;
        }

        #json-viewer::after {
            content: "}";
            display: block;
            color: #aaa;
        }

        .json-entry {
            margin-left: 20px;
            white-space: pre-wrap;
            color: #ccc;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
        }
    </style>
</head>

<body>

    <div id="monitor-panel">
        <div id="status-float">Connecting...</div>
        <div id="json-viewer">
            <div class="json-entry">"status": "Waiting for stream..."</div>
        </div>
    </div>

    <div id="terminal-panel">
        <div id="log-area">
            <div class="log-line sys">Shoga CLI Transmitter v1.4.0 initialized.</div>
            <div class="log-line sys">Mode: API Key Only (Anonymous)</div>
            <div class="log-line info">Commands: /clear | /reply [id] [text] | /react [id] [emoji] | /edit [id] [text]</div>
        </div>
        <div class="input-line">
            <span class="prompt">shoga@cli:~$</span>
            <input type="text" id="cmd-input" autocomplete="off" autofocus>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, update, onChildAdded, onChildChanged, serverTimestamp, query, limitToLast, orderByKey, endBefore, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const monitorPanel = document.getElementById('monitor-panel');
        const jsonViewer = document.getElementById('json-viewer');
        const statusFloat = document.getElementById('status-float');
        const logArea = document.getElementById('log-area');
        const cmdInput = document.getElementById('cmd-input');

        const VAULT_NAME = 'shoga_vault';
        const enc = new TextEncoder();
        const dec = new TextDecoder();
        const getK = async () => {
            const b = await crypto.subtle.importKey('raw', enc.encode('shoga_v1'), 'PBKDF2', false, ['deriveKey']);
            return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: enc.encode('shoga_s'), iterations: 1000, hash: 'SHA-256' }, b, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
        };

        let tK = sessionStorage.getItem('temp_console_api_key');
        let tN = sessionStorage.getItem('temp_console_nick');
        let tR = sessionStorage.getItem('temp_console_room_id');

        if (tK) {
            const k = await getK();
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const eb = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, k, enc.encode(JSON.stringify({ tK, tN, tR })));
            const c = new Uint8Array(iv.length + eb.byteLength);
            c.set(iv); c.set(new Uint8Array(eb), iv.length);
            sessionStorage.setItem(VAULT_NAME, btoa(String.fromCharCode(...c)));
            sessionStorage.removeItem('temp_console_api_key');
            sessionStorage.removeItem('temp_console_nick');
            sessionStorage.removeItem('temp_console_room_id');
        } else {
            const v = sessionStorage.getItem(VAULT_NAME);
            if (v) {
                try {
                    const c = Uint8Array.from(atob(v), x => x.charCodeAt(0));
                    const k = await getK();
                    const db = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: c.slice(0, 12) }, k, c.slice(12));
                    const d = JSON.parse(dec.decode(db));
                    tK = d.tK; tN = d.tN; tR = d.tR;
                } catch (e) { console.error("Vault recovery failed"); }
            }
        }

        const sessionApiKey = tK;
        const sessionNick = tN;
        const sessionRoomId = tR;

        if (!sessionApiKey) {
            statusFloat.innerText = "MISSING API KEY";
            statusFloat.style.color = "#ff5555";
            const div = document.createElement('div');
            div.className = 'log-line err';
            div.innerText = "[System] Error: API Key is missing. Please login from index.html.";
            logArea.appendChild(div);
            throw new Error("API Key is missing");
        }

        const FIXED_NICK = sessionNick || "쇼가";
        const GLOBAL_ROOM_ID = sessionRoomId || "Laboratory";
        const firebaseConfig = {
            apiKey: sessionApiKey,
            authDomain: "shoga-intermediary.firebaseapp.com",
            databaseURL: "https://shoga-intermediary-default-rtdb.firebaseio.com",
            projectId: "shoga-intermediary",
            storageBucket: "shoga-intermediary.firebasestorage.app",
            messagingSenderId: "696629323825",
            appId: "1:696629323825:web:fede1b0d1dd1695afccd10",
            measurementId: "G-E4L52Z0HRE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let isInitialLoad = true;
        let oldestMessageKey = null;
        let isFirstLoadEvent = true;
        let isLoadingHistory = false;
        let hasMoreHistory = true;
        let isJsonViewerInitialized = false;

        const reactionsState = {};

        const EMOJI_MAP = {
            'Thumbsup': 'Emoji_Thumbsup',
            'Heart': 'Emoji_Heart',
            'Joy': 'Emoji_Joy',
            'Surprised': 'Emoji_Surprised',
            'Sad': 'Emoji_Sad',
            'Pleading': 'Emoji_Pleading'
        };
        const REVERSE_EMOJI_MAP = Object.fromEntries(Object.entries(EMOJI_MAP).map(([k, v]) => [v, k]));

        const defaultFavicon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230c0c0c'/%3E%3Ctext x='2' y='12' fill='%2300ff00' font-family='monospace' font-size='12'%3E%3E%3C/text%3E%3C/svg%3E";
        const alertFavicon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230c0c0c'/%3E%3Ctext x='2' y='12' fill='%2300ff00' font-family='monospace' font-size='12'%3E%3E%3C/text%3E%3Ccircle cx='13' cy='3' r='3' fill='%23ff5555'/%3E%3C/svg%3E";

        function setFaviconAlert(showAlert) {
            const link = document.getElementById('dynamic-favicon');
            if (link) {
                link.href = showAlert ? alertFavicon : defaultFavicon;
            }
        }

        window.addEventListener('focus', () => setFaviconAlert(false));
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') setFaviconAlert(false);
        });

        function printLog(text, type = '') {
            const div = document.createElement('div');
            div.className = `log-line ${type}`;
            const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
            div.innerText = `[${time}] ${text}`;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        let isMonitoringStarted = false; 
        let isReconnecting = false;      

        function silentAuthenticate() {
            signInAnonymously(auth).catch((error) => {
                printLog(`[System] Auth Error: ${error.message}. Retrying in 3s...`, 'err');
                setTimeout(silentAuthenticate, 3000); 
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                isReconnecting = false;
                statusFloat.innerText = `● CONNECTED[${GLOBAL_ROOM_ID}]`;
                statusFloat.style.color = "#00ff00";
                printLog(`[System] Auth Active. Room: ${GLOBAL_ROOM_ID}`, 'sys');

                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }

                if (!isMonitoringStarted) {
                    startMonitoring();
                    isMonitoringStarted = true;
                }
            } else {
                currentUser = null;
                statusFloat.innerText = "○ RECONNECTING...";
                statusFloat.style.color = "#ffaa00";
                
                if (!isReconnecting) {
                    isReconnecting = true;
                    printLog("[System] Session expired or lost. Silently re-authenticating...", 'err');
                    silentAuthenticate(); 
                }
            }
        });

        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                statusFloat.innerText = `● CONNECTED[${GLOBAL_ROOM_ID}]`;
                statusFloat.style.color = "#00ff00";
                if (isReconnecting || isMonitoringStarted) {
                    printLog("[System] Network connection restored.", 'success');
                }
            } else {
                statusFloat.innerText = "○ OFFLINE";
                statusFloat.style.color = "#ff5555";
                printLog("[System] Network disconnected. Waiting for connection...", 'err');
            }
        });

        silentAuthenticate();

        function formatJsonEntry(data) {
            let jsonString = JSON.stringify(data, null, 2);
            jsonString = jsonString.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            jsonString = jsonString.replace(/"(https?:\/\/[^"]+)"/g, '"<a href="$1" target="_blank" style="color: #4ca1af; text-decoration: underline;">$1</a>"');
            return jsonString;
        }

        function upsertJsonEntry(key, data) {
            let el = document.getElementById(`json-${key}`);
            if (!el) {
                el = document.createElement('div');
                el.id = `json-${key}`;
                el.className = 'json-entry';
                jsonViewer.appendChild(el);
            }
            el.innerHTML = `"${key}": ${formatJsonEntry(data)},`;
            return el;
        }

        function updateReactionState(msgKey, emojiCode, uid, isAdded) {
            if (!reactionsState[msgKey]) reactionsState[msgKey] = {};
            if (!reactionsState[msgKey][emojiCode]) reactionsState[msgKey][emojiCode] = {};

            if (isAdded) {
                reactionsState[msgKey][emojiCode][uid] = true;
            } else {
                delete reactionsState[msgKey][emojiCode][uid];
            }
        }

        function startMonitoring() {
            const roomRef = ref(db, `chats/${GLOBAL_ROOM_ID}`);
            const q = query(roomRef, limitToLast(500));

            get(q).then((snapshot) => {
                if (!snapshot.exists()) {
                    jsonViewer.innerHTML = '<div class="json-entry">"status": "Empty"</div>';
                    isJsonViewerInitialized = true;
                }
            });

            onChildAdded(q, (snapshot) => {
                const key = snapshot.key;
                const data = snapshot.val();

                if (isFirstLoadEvent) {
                    oldestMessageKey = key;
                    isFirstLoadEvent = false;
                }

                if (!isJsonViewerInitialized) {
                    jsonViewer.innerHTML = '';
                    isJsonViewerInitialized = true;
                }

                const isAtBottom = monitorPanel.scrollHeight - monitorPanel.scrollTop - monitorPanel.clientHeight <= 50;
                upsertJsonEntry(key, data);

                if (isAtBottom && !isLoadingHistory) {
                    monitorPanel.scrollTop = monitorPanel.scrollHeight;
                }

                if (data && data.type === 'reaction') {
                    updateReactionState(data.targetKey, data.emoji, data.uid, data.isAdded);
                    return;
                }

                if (data && data.type === 'edit') {
                    return;
                }

                if (data && data.reactions) {
                    for (const [emojiCode, users] of Object.entries(data.reactions)) {
                        for (const [uid, val] of Object.entries(users)) {
                            if (val) updateReactionState(key, emojiCode, uid, true);
                        }
                    }
                }

                if (!isInitialLoad) {
                    if (!data || (currentUser && data.uid === currentUser.uid)) return;

                    if (document.hidden) {
                        setFaviconAlert(true);

                        if ("Notification" in window && Notification.permission === "granted") {
                            const notification = new Notification(data.nick || "Unknown", {
                                body: data.text
                            });
                            notification.onclick = () => {
                                window.focus();
                                notification.close();
                            };
                        }
                    }
                }
            });

            onChildChanged(q, (snapshot) => {
                const key = snapshot.key;
                const data = snapshot.val();
                upsertJsonEntry(key, data);

                if (data && data.type !== 'reaction' && data.reactions) {
                    for (const [emojiCode, users] of Object.entries(data.reactions)) {
                        for (const [uid, val] of Object.entries(users)) {
                            if (val) updateReactionState(key, emojiCode, uid, true);
                        }
                    }
                }
            });

            setTimeout(() => {
                isInitialLoad = false;
            }, 2000);
        }

        monitorPanel.addEventListener('scroll', async () => {
            if (monitorPanel.scrollTop <= 5 && !isLoadingHistory && hasMoreHistory) {
                await loadMoreHistory();
            }
        });

        async function loadMoreHistory() {
            if (!oldestMessageKey || !hasMoreHistory || isLoadingHistory) return;
            isLoadingHistory = true;

            const oldScrollHeight = monitorPanel.scrollHeight;
            const currentScrollTop = monitorPanel.scrollTop;
            printLog("Loading older messages...", 'sys');

            try {
                const roomRef = ref(db, `chats/${GLOBAL_ROOM_ID}`);
                const q = query(roomRef, orderByKey(), endBefore(oldestMessageKey), limitToLast(500));
                const snapshot = await get(q);

                if (snapshot.exists()) {
                    const messages = [];
                    snapshot.forEach((childSnapshot) => {
                        messages.push({ key: childSnapshot.key, data: childSnapshot.val() });
                    });

                    if (messages.length > 0) {
                        oldestMessageKey = messages[0].key;

                        const fragment = document.createDocumentFragment();
                        messages.forEach((msgObj) => {
                            if (msgObj.data && msgObj.data.type === 'reaction') {
                                updateReactionState(msgObj.data.targetKey, msgObj.data.emoji, msgObj.data.uid, msgObj.data.isAdded);
                            } else if (msgObj.data && msgObj.data.reactions) {
                                for (const [emojiCode, users] of Object.entries(msgObj.data.reactions)) {
                                    for (const [uid, val] of Object.entries(users)) {
                                        if (val) updateReactionState(msgObj.key, emojiCode, uid, true);
                                    }
                                }
                            }

                            const div = document.createElement('div');
                            div.id = `json-${msgObj.key}`;
                            div.className = 'json-entry';
                            div.innerHTML = `"${msgObj.key}": ${formatJsonEntry(msgObj.data)},`;
                            fragment.appendChild(div);
                        });

                        jsonViewer.prepend(fragment);

                        monitorPanel.scrollTop = monitorPanel.scrollHeight - oldScrollHeight + currentScrollTop;

                        printLog(`Loaded ${messages.length} older messages.`, 'sys');
                    } else {
                        hasMoreHistory = false;
                        printLog("No more history to load.", 'sys');
                    }
                } else {
                    hasMoreHistory = false;
                    printLog("No more history to load.", 'sys');
                }
            } catch (e) {
                console.error("History load error", e);
                printLog(`History load error: ${e.message}`, 'err');
            }

            isLoadingHistory = false;
        }

        async function sendMessage(text, replyTo = null) {
            if (!currentUser) return;

            const chatRef = ref(db, `chats/${GLOBAL_ROOM_ID}`);
            try {
                const payload = {
                    uid: currentUser.uid,
                    nick: FIXED_NICK,
                    text: text,
                    time: serverTimestamp()
                };
                if (replyTo) payload.replyTo = replyTo;

                await push(chatRef, payload);
                printLog(`Sent: ${text}`, 'success');
            } catch (e) {
                printLog(`Error: ${e.message}`, 'err');
            }
        }

        let isCmdSending = false;
        cmdInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                if (isCmdSending) return;
                const val = cmdInput.value.trim();
                if (!val) return;

                if (val === '/clear') {
                    logArea.innerHTML = '';
                    printLog("Console cleared.", 'sys');
                    cmdInput.value = '';
                }
                else if (val.startsWith('/reply ')) {
                    const parts = val.split(' ');
                    if (parts.length >= 3) {
                        const targetKey = parts[1];
                        const msgText = parts.slice(2).join(' ');

                        isCmdSending = true;
                        cmdInput.style.opacity = '0.5';
                        cmdInput.value = '';

                        try {
                            const targetRef = ref(db, `chats/${GLOBAL_ROOM_ID}/${targetKey}`);
                            const snap = await get(targetRef);
                            if (snap.exists()) {
                                const targetData = snap.val();
                                await sendMessage(msgText, {
                                    key: targetKey,
                                    nick: targetData.nick,
                                    text: targetData.text
                                });
                            } else {
                                printLog(`Error: Target message [${targetKey}] not found.`, 'err');
                            }
                        } catch (err) {
                            printLog(`Error: ${err.message}`, 'err');
                        }

                        isCmdSending = false;
                        cmdInput.style.opacity = '1';
                        cmdInput.focus();
                    } else {
                        printLog("Usage: /reply [message_id] [text]", 'err');
                    }
                }
                else if (val.startsWith('/react ')) {
                    const parts = val.split(' ');
                    if (parts.length === 3) {
                        const targetKey = parts[1];
                        const emoji = parts[2];
                        const codeName = EMOJI_MAP[emoji] || emoji;

                        isCmdSending = true;
                        cmdInput.style.opacity = '0.5';
                        cmdInput.value = '';

                        let isReacted = false;
                        if (reactionsState[targetKey] && reactionsState[targetKey][codeName] && reactionsState[targetKey][codeName][currentUser.uid]) {
                            isReacted = true;
                        }

                        const willReact = !isReacted;

                        push(ref(db, `chats/${GLOBAL_ROOM_ID}`), {
                            uid: currentUser.uid,
                            nick: FIXED_NICK,
                            text: 'reaction',
                            type: 'reaction',
                            targetKey: targetKey,
                            emoji: codeName,
                            isAdded: willReact,
                            time: serverTimestamp()
                        }).then(() => {
                            printLog(`Sent reaction event: ${willReact ? 'Add' : 'Remove'} [${emoji}] on [${targetKey}]`, 'success');
                        }).catch(err => {
                            printLog(`Error: ${err.message}`, 'err');
                        });

                        isCmdSending = false;
                        cmdInput.style.opacity = '1';
                        cmdInput.focus();
                    } else {
                        printLog("Usage: /react [message_id] [emoji]", 'err');
                    }
                }
                else if (val.startsWith('/edit ')) {
                    const parts = val.split(' ');
                    if (parts.length >= 3) {
                        const targetKey = parts[1];
                        const msgText = parts.slice(2).join(' ');

                        isCmdSending = true;
                        cmdInput.style.opacity = '0.5';
                        cmdInput.value = '';

                        try {
                            const targetRef = ref(db, `chats/${GLOBAL_ROOM_ID}/${targetKey}`);
                            const snap = await get(targetRef);
                            if (snap.exists()) {
                                const targetData = snap.val();
                                if (targetData.uid !== currentUser.uid) {
                                    printLog(`Error: You can only edit your own messages.`, 'err');
                                } else {
                                    const chatRef = ref(db, `chats/${GLOBAL_ROOM_ID}`);
                                    await push(chatRef, {
                                        uid: currentUser.uid,
                                        nick: FIXED_NICK,
                                        text: msgText,
                                        type: 'edit',
                                        targetKey: targetKey,
                                        time: serverTimestamp()
                                    });
                                    printLog(`Edited message [${targetKey}]`, 'success');
                                }
                            } else {
                                printLog(`Error: Target message [${targetKey}] not found.`, 'err');
                            }
                        } catch (err) {
                            printLog(`Error: ${err.message}`, 'err');
                        }

                        isCmdSending = false;
                        cmdInput.style.opacity = '1';
                        cmdInput.focus();
                    } else {
                        printLog("Usage: /edit [message_id] [text]", 'err');
                    }
                }
                else {
                    isCmdSending = true;
                    cmdInput.style.opacity = '0.5';
                    cmdInput.value = '';

                    await sendMessage(val);

                    isCmdSending = false;
                    cmdInput.style.opacity = '1';
                    cmdInput.focus();
                }
            }
        });

        document.body.addEventListener('click', () => {
            const sel = window.getSelection();
            if (document.activeElement !== cmdInput && (!sel || sel.toString().length === 0)) {
                cmdInput.focus();
            }
        });
    </script>
</body>

</html>
