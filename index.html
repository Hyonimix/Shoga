        async function checkUrlSafety(url) {
            try {
                const formData = new URLSearchParams();
                formData.append('url', url);
                
                const response = await fetch('https://urlhaus-api.abuse.ch/v1/url/', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.query_status === 'ok') {
                    return false;
                }
                
                return true;
            } catch (error) {
                console.error("URL 안전성 검사 중 오류 발생:", error);
                return true;
            }
        }

        function createMessageHTML(key, data, isConsecutive) {
            const isMe = user && (data.uid === user.uid);
            const isLina = data.nick === '리나';
            const isLia = data.nick === '리아';
            const nickColor = getNickColor(data.nick);
            const timeStr = data.time ? formatTime(data.time) : '';
            
            const currentText = editsState[key] ? editsState[key].text : data.text;
            
            const editTimeVal = editsState[key] ? editsState[key].time : data.editedTime;
            const hasEdit = !!editTimeVal;
            const displayTimeStr = hasEdit ? formatTime(editTimeVal) : timeStr;
            const editMarkHtml = hasEdit ? ` <span class="edit-mark" style="font-size: 9px; opacity: 0.8;">(수정됨)</span>` : '';

            let html = '';
            if (!isMe && !isConsecutive) {
                html += `<span class="sender-name" style="color: ${nickColor}">
                            ${escapeHtml(formatDisplayNick(data.nick))}
                            ${(isLina || isLia) ? '<span class="badge-ai">AI</span>' : ''}
                         </span>`;
            }

            html += `<div class="bubble-container">`;

            // Re-construct bubble inner content
            html += `  <div class="bubble">`;
            if (data.replyTo) {
                html += `<div class="bubble-reply">
                            <div class="bubble-reply-nick">${escapeHtml(formatDisplayNick(data.replyTo.nick))}</div>
                            <div class="bubble-reply-text">${escapeHtml(data.replyTo.text)}</div>
                         </div>`;
            }
            
            if (data.imageUrl) {
                const now = Date.now();
                const isExpired = data.time && (now - data.time >= 604800000); // 7 days
                if (isExpired) {
                    html += `<div class="img-wrapper"><img src="${fallbackImageSvg}" class="chat-img" style="cursor: default;"></div>`;
                } else {
                    html += `<div class="img-wrapper"><div class="img-loading-spinner"></div><img src="${data.imageUrl}" class="chat-img" loading="lazy" onload="this.previousElementSibling.style.display='none';" onerror="window.handleChatImageError(this, ${data.time || 0})" onclick="window.open('${data.imageUrl}', '_blank')"></div>`;
                }
            }
            
            if (currentText && currentText !== 'reaction' && data.type !== 'reaction') {
                html += `<div>${parseLinks(escapeHtml(currentText))}</div>`;
            }
            
            html += `</div>`;

            // Container for time and reactions
            html += `<div style="display: flex; flex-direction: column; align-items: ${isMe ? 'flex-end' : 'flex-start'};">`;
            
            html += `  <span class="msg-time${hasEdit ? ' edited' : ''}">${displayTimeStr}${editMarkHtml}</span>`;
            
            html += `  <div class="reactions-container" id="reactions-${key}">${renderReactions(key)}</div>`;
            html += `</div>`;

            html += `</div>`;

            return { html, isMe, isLina, isLia };
        }

        function renderReactions(msgKey) {
            const state = reactionsState[msgKey] || {};
            let html = '';

            for (const [codeName, usersObj] of Object.entries(state)) {
                if (!usersObj) continue;
                const userKeys = Object.keys(usersObj);
                const count = userKeys.length;
                if (count === 0) continue;
                const amIReacted = user && userKeys.includes(user.uid);

                const displayEmoji = REVERSE_EMOJI_MAP[codeName] || codeName;

                html += `<div class="reaction-badge ${amIReacted ? 'active' : ''}" onclick="toggleReaction('${msgKey}', '${displayEmoji}')">
                            ${displayEmoji} <span>${count > 1 ? count : ''}</span>
                         </div>`;
            }
            return html;
        }

        function updateMessageInDOM(key) {
            const rows = document.querySelectorAll(`.msg-row[data-key="${key}"]`);
            rows.forEach(row => {
                const bubble = row.querySelector('.bubble');
                if (bubble) {
                    let replyHtml = '';
                    const replyBlock = bubble.querySelector('.bubble-reply');
                    if (replyBlock) replyHtml = replyBlock.outerHTML;

                    let imgHtml = '';
                    const existingImgWrapper = bubble.querySelector('.img-wrapper');
                    if (existingImgWrapper) {
                        imgHtml = existingImgWrapper.outerHTML;
                    } else {
                        const existingImg = bubble.querySelector('.chat-img');
                        if (existingImg) imgHtml = existingImg.outerHTML;
                    }

                    const newText = editsState[key] ? editsState[key].text : "삭제됨";
                    let textHtml = '';
                    if (newText && newText !== 'reaction') {
                        textHtml = `<div>${parseLinks(escapeHtml(newText))}</div>`;
                    }

                    bubble.innerHTML = replyHtml + imgHtml + textHtml;
                }
                const timeEl = row.querySelector('.msg-time');
                if (timeEl) {
                    timeEl.style.display = 'block';
                    const editTimeVal = editsState[key] ? editsState[key].time : null;
                    if (editTimeVal) {
                        timeEl.innerHTML = `${formatTime(editTimeVal)} <span class="edit-mark" style="font-size: 9px; opacity: 0.8;">(수정됨)</span>`;
                        timeEl.classList.add('edited');
                    }
                }
            });
        }

        function loadChat() {
            const chatArea = document.getElementById('chat-area');
            chatArea.innerHTML = `<div class="system-msg" id="auth-success-msg">인증 성공! 닉네임:[${formatDisplayNick(myNick)}]</div>`;
            const chatRef = ref(db, 'chats/' + currentRoomId);
            const q = query(chatRef, limitToLast(100));

            isFirstLoadEvent = true;
            oldestMessageKey = null;
            oldestMessageTime = null;
            hasMoreHistory = true;

            get(q).then(() => {
                const msg = document.getElementById('auth-success-msg');
                if (msg) msg.remove();
                
                // Background Pre-fetching for drastically faster search later
                setTimeout(silentPreFetch, 3000);
            }).catch(e => console.error(e));

            onChildAdded(q, (snapshot) => {
                const data = snapshot.val();
                const key = snapshot.key;

                if (isFirstLoadEvent) {
                    oldestMessageKey = key;
                    oldestMessageTime = data.time || Date.now();
                    lastMessageDateStr = "";
                    isFirstLoadEvent = false;
                }

                if (!data) return;

                if (!window.globalChatData.find(m => m.key === key)) {
                    window.globalChatData.push({ key, data });
                }
                
                if (document.getElementById('lab-drawer').classList.contains('open')) {
                    refreshActiveDrawerTab();
                }

                if (data.type === 'reaction') {
                    updateReactionState(data.targetKey, data.emoji, data.uid, data.isAdded);
                    const container = document.getElementById(`reactions-${data.targetKey}`);
                    if (container) {
                        container.innerHTML = renderReactions(data.targetKey);
                    }
                    return;
                }

                if (data.type === 'edit') {
                    if (!editsState[data.targetKey] || (editsState[data.targetKey].time || 0) < (data.time || 0)) {
                        editsState[data.targetKey] = { text: data.text, time: data.time };
                        updateMessageInDOM(data.targetKey);
                    }
                    return;
                }

                if (data.reactions) {
                    for (const [emojiCode, users] of Object.entries(data.reactions)) {
                        for (const [uid, val] of Object.entries(users)) {
                            if (val) updateReactionState(key, emojiCode, uid, true);
                        }
                    }
                }

                drawMessage(key, data);
            });

            onChildChanged(q, (snapshot) => {
                const data = snapshot.val();
                const key = snapshot.key;

                const idx = window.globalChatData.findIndex(m => m.key === key);
                if (idx !== -1) window.globalChatData[idx].data = data;
                
                if (document.getElementById('lab-drawer').classList.contains('open')) {
                    refreshActiveDrawerTab();
                }

                if (data && data.type !== 'reaction' && data.type !== 'edit') {
                    if (data.reactions) {
                        for (const [emojiCode, users] of Object.entries(data.reactions)) {
                            for (const [uid, val] of Object.entries(users)) {
                                if (val) updateReactionState(key, emojiCode, uid, true);
                            }
                        }
                    }
                    const reactionsContainer = document.getElementById(`reactions-${key}`);
                    if (reactionsContainer) {
                        reactionsContainer.innerHTML = renderReactions(key);
                    }

                    const rows = document.querySelectorAll(`.msg-row[data-key="${key}"]`);
                    rows.forEach(row => {
                        const bubble = row.querySelector('.bubble');
                        if (bubble) {
                            let replyHtml = '';
                            const replyBlock = bubble.querySelector('.bubble-reply');
                            if (replyBlock) replyHtml = replyBlock.outerHTML;
                            
                            let imgHtml = '';
                            if (data.imageUrl) {
                                const now = Date.now();
                                const isExpired = data.time && (now - data.time >= 604800000);
                                if (isExpired) {
                                    imgHtml = `<div class="img-wrapper"><img src="${fallbackImageSvg}" class="chat-img" style="cursor: default;"></div>`;
                                } else {
                                    imgHtml = `<div class="img-wrapper"><div class="img-loading-spinner"></div><img src="${data.imageUrl}" class="chat-img" loading="lazy" onload="this.previousElementSibling.style.display='none';" onerror="window.handleChatImageError(this, ${data.time || 0})" onclick="window.open('${data.imageUrl}', '_blank')"></div>`;
                                }
                            }

                            const newText = editsState[key] ? editsState[key].text : data.text;
                            let textHtml = '';
                            if (newText && newText !== 'reaction' && data.type !== 'reaction') {
                                textHtml = `<div>${parseLinks(escapeHtml(newText))}</div>`;
                            }

                            bubble.innerHTML = replyHtml + imgHtml + textHtml;
                        }
                        const timeEl = row.querySelector('.msg-time');
                        if (timeEl) {
                            const timeStr = data.time ? formatTime(data.time) : '';
                            const editTimeVal = editsState[key] ? editsState[key].time : data.editedTime;
                            const hasEdit = !!editTimeVal;
                            const displayTimeStr = hasEdit ? formatTime(editTimeVal) : timeStr;
                            const editMarkHtml = hasEdit ? ` <span class="edit-mark" style="font-size: 9px; opacity: 0.8;">(수정됨)</span>` : '';

                            timeEl.innerHTML = `${displayTimeStr}${editMarkHtml}`;
                            if (hasEdit) {
                                timeEl.style.display = 'block';
                                timeEl.classList.add('edited');
                            }
                        }
                    });
                }
            });
        }

        async function silentPreFetch() {
            if (!oldestMessageKey) return;
            try {
                // Fetch up to 1000 messages silently in background for instant search
                const chatRef = ref(db, 'chats/' + currentRoomId);
                const q = query(chatRef, orderByKey(), endAt(oldestMessageKey), limitToLast(1000));
                const snapshot = await get(q);
                
                if (snapshot.exists()) {
                    const messages =[];
                    snapshot.forEach((child) => {
                        if (!window.globalChatData.find(m => m.key === child.key)) {
                            messages.push({ key: child.key, data: child.val() });
                        }
                    });
                    
                    if (messages.length > 0) {
                        window.globalChatData = messages.concat(window.globalChatData);
                        // Sort by time just in case
                        window.globalChatData.sort((a, b) => (a.data.time || 0) - (b.data.time || 0));
                        
                        // If drawer is open, refresh silently
                        if (document.getElementById('lab-drawer').classList.contains('open')) {
                            refreshActiveDrawerTab();
                        }
                    }
                }
            } catch (e) {
                console.log('Pre-fetch failed', e);
            }
        }

        async function fetchHistoryChunk(limitAmount) {
            if (!oldestMessageKey || !hasMoreHistory || isLoadingHistory) return false;
            isLoadingHistory = true;

            const chatArea = document.getElementById('chat-area');
            const oldScrollHeight = chatArea.scrollHeight;
            const currentScrollTop = chatArea.scrollTop;

            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'system-msg';
            loadingMsg.innerText = '이전 대화 불러오는 중...';
            chatArea.prepend(loadingMsg);

            try {
                const chatRef = ref(db, 'chats/' + currentRoomId);
                const q = query(chatRef, orderByKey(), endAt(oldestMessageKey), limitToLast(limitAmount));
                const snapshot = await get(q);

                loadingMsg.remove();

                if (snapshot.exists()) {
                    const messages =[];
                    snapshot.forEach((childSnapshot) => {
                        if (childSnapshot.key !== oldestMessageKey) {
                            messages.push({ key: childSnapshot.key, data: childSnapshot.val() });
                        }
                    });

                    if (messages.length > 0) {
                        // Merge into global array
                        messages.forEach(msg => {
                            if (!window.globalChatData.find(m => m.key === msg.key)) {
                                window.globalChatData.unshift(msg);
                            }
                        });
                        window.globalChatData.sort((a, b) => (a.data.time || 0) - (b.data.time || 0));

                        oldestMessageKey = messages[0].key;
                        oldestMessageTime = messages[0].data.time || oldestMessageTime;

                        const fragment = document.createDocumentFragment();
                        let chunkLastSenderId = null;
                        let chunkLastMessageTimeStr = "";
                        let chunkLastDateStr = "";

                        messages.forEach((msgObj) => {
                            const data = msgObj.data;
                            const key = msgObj.key;

                            if (data.type === 'reaction') {
                                updateReactionState(data.targetKey, data.emoji, data.uid, data.isAdded);
                                return;
                            }

                            if (data.type === 'edit') {
                                if (!editsState[data.targetKey] || (editsState[data.targetKey].time || 0) < (data.time || 0)) {
                                    editsState[data.targetKey] = { text: data.text, time: data.time };
                                    updateMessageInDOM(data.targetKey);
                                }
                                return;
                            }

                            if (data.reactions) {
                                for (const [emojiCode, users] of Object.entries(data.reactions)) {
                                    for (const [uid, val] of Object.entries(users)) {
                                        if (val) updateReactionState(key, emojiCode, uid, true);
                                    }
                                }
                            }

                            const dateStr = data.time ? formatDateDivider(data.time) : '';
                            if (dateStr && chunkLastDateStr !== dateStr) {
                                const divider = document.createElement('div');
                                divider.className = 'system-msg date-divider';
                                divider.dataset.date = dateStr;
                                divider.innerText = dateStr;
                                fragment.appendChild(divider);
                                chunkLastDateStr = dateStr;

                                chunkLastSenderId = null;
                                chunkLastMessageTimeStr = "";
                            }

                            const currentSenderId = data.uid || data.nick;
                            const timeStr = data.time ? formatTime(data.time) : '';

                            const isSameSender = (chunkLastSenderId === currentSenderId);
                            const isSameTime = (chunkLastMessageTimeStr === timeStr);

                            if (isSameSender && isSameTime) {
                                const lastRow = fragment.lastElementChild;
                                if (lastRow && lastRow.classList.contains('msg-row')) {
                                    const hasEditMark = lastRow.querySelector('.edited');
                                    if (!hasEditMark) {
                                        const lastTimeEl = lastRow.querySelector('.msg-time');
                                        if (lastTimeEl) lastTimeEl.style.display = 'none';
                                    }
                                }
                            }

                            chunkLastSenderId = currentSenderId;
                            chunkLastMessageTimeStr = timeStr;

                            const { html, isMe, isLina, isLia } = createMessageHTML(key, data, isSameSender && isSameTime);

                            const row = document.createElement('div');
                            row.dataset.key = key;
                            row.dataset.nick = data.nick || '';
                            row.className = `msg-row ${isMe ? 'me' : 'other'} ${isLina ? 'lina-msg' : ''} ${isLia ? 'lia-msg' : ''} ${(isSameSender && isSameTime) ? 'consecutive' : ''}`;
                            row.innerHTML = html;

                            fragment.appendChild(row);
                        });

                        const firstDivider = chatArea.querySelector('.date-divider');
                        const firstMsgRow = chatArea.querySelector('.msg-row');
                        if (firstDivider && firstMsgRow) {
                            if (firstDivider.compareDocumentPosition(firstMsgRow) & Node.DOCUMENT_POSITION_FOLLOWING) {
                                if (firstDivider.dataset.date === chunkLastDateStr) {
                                    firstDivider.remove();
                                }
                            }
                        }

                        if (firstMsgRow) {
                            chatArea.insertBefore(fragment, firstMsgRow);
                        } else {
                            chatArea.prepend(fragment);
                        }

                        chatArea.scrollTop = chatArea.scrollHeight - oldScrollHeight + currentScrollTop;
                        return true;
                    } else {
                        hasMoreHistory = false;
                    }
                } else {
                    hasMoreHistory = false;
                }
            } catch (e) {
                console.error("History load error", e);
                loadingMsg.remove();
            } finally {
                isLoadingHistory = false;
            }
            return false;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            let hours = date.getHours();
            const minutes = date.getMinutes();
            const ampm = hours >= 12 ? '오후' : '오전';
            hours = hours % 12;
            hours = hours ? hours : 12;
            const strMinutes = minutes < 10 ? '0' + minutes : minutes;
            return `${ampm} ${hours}:${strMinutes}`;
        }

        function formatDateDivider(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();

            const isToday = date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();

            const yesterday = new Date(now);
            yesterday.setDate(now.getDate() - 1);
            const isYesterday = date.getDate() === yesterday.getDate() && date.getMonth() === yesterday.getMonth() && date.getFullYear() === yesterday.getFullYear();

            const days =['일', '월', '화', '수', '목', '금', '토'];
            const dayStr = days[date.getDay()];

            if (isToday) return `오늘`;
            if (isYesterday) return `어제`;

            return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일 ${dayStr}요일`;
        }

        function drawMessage(key, data) {
            const chatArea = document.getElementById('chat-area');
            const alertBadge = document.getElementById('new-msg-alert');

            const dateStr = data.time ? formatDateDivider(data.time) : '';
            if (dateStr && lastMessageDateStr !== dateStr) {
                const divider = document.createElement('div');
                divider.className = 'system-msg date-divider';
                divider.dataset.date = dateStr;
                divider.innerText = dateStr;
                chatArea.appendChild(divider);
                lastMessageDateStr = dateStr;

                lastSenderId = null;
                lastMessageTimeStr = "";
            }

            const currentSenderId = data.uid || data.nick;
            const timeStr = data.time ? formatTime(data.time) : '';

            const isSameSender = (lastSenderId === currentSenderId);
            const isSameTime = (lastMessageTimeStr === timeStr);

            if (isSameSender && isSameTime) {
                const lastRow = chatArea.lastElementChild;
                if (lastRow && lastRow.classList.contains('msg-row')) {
                    const hasEditMark = lastRow.querySelector('.edited');
                    if (!hasEditMark) {
                        const lastTimeEl = lastRow.querySelector('.msg-time');
                        if (lastTimeEl) lastTimeEl.style.display = 'none';
                    }
                }
            }

            lastSenderId = currentSenderId;
            lastMessageTimeStr = timeStr;

            const threshold = 50;
            const wasAtBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight <= threshold;

            const { html, isMe, isLina, isLia } = createMessageHTML(key, data, isSameSender && isSameTime);

            const row = document.createElement('div');
            row.dataset.key = key;
            row.dataset.nick = data.nick || '';
            row.className = `msg-row ${isMe ? 'me' : 'other'} ${isLina ? 'lina-msg' : ''} ${isLia ? 'lia-msg' : ''} ${(isSameSender && isSameTime) ? 'consecutive' : ''}`;
            row.innerHTML = html;

            chatArea.appendChild(row);

            if (isInitialLoad) {
                chatArea.scrollTop = chatArea.scrollHeight;
                return;
            }

            if (!isJumpActive && (isMe || wasAtBottom)) {
                chatArea.scrollTop = chatArea.scrollHeight;
                alertBadge.classList.remove('show');
            } else {
                alertBadge.classList.add('show');
            }

            if (!isMe && document.hidden) {
                setFaviconAlert(true);
                if ("Notification" in window && Notification.permission === "granted") {
                    const notification = new Notification(formatDisplayNick(data.nick), {
                        body: data.imageUrl ? '' : data.text
                    });
                    notification.onclick = () => {
                        window.focus();
                        notification.close();
                    };
                }
            }
        }

        setTimeout(() => {
            isInitialLoad = false;
        }, 2000);

        async function compressImage(file) {
            const targetSize = 512 * 1024; // 512KB
            if (file.size <= targetSize && file.type === 'image/webp') return file;

            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(img.src);
                    const canvas = document.createElement('canvas');
                    
                    const estimatedBpp = 0.5;
                    const maxPixels = targetSize / estimatedBpp;
                    const currentPixels = img.width * img.height;
                    const scale = Math.min(1, Math.sqrt(maxPixels / currentPixels));

                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, 'image/webp', 0.7);
                };
            });
        }

        let isSending = false;
        window.sendMessage = async () => {
            if (isSending) return;
            const input = document.getElementById('msg-input');
            const btn = document.getElementById('send-btn');
            const text = input.value.trim();
            
            if (!text && !pendingImageFile) return;
            if (!user) return;

            if (isJumpActive) {
                window.returnToOriginalPosition(); // Auto-return when sending msg
            }

            isSending = true;
            btn.disabled = true;
            btn.style.opacity = '0.5';

            try {
                if (currentEditData) {
                    const chatRef = ref(db, 'chats/' + currentRoomId);
                    await push(chatRef, {
                        uid: user.uid,
                        nick: myNick,
                        text: text,
                        type: 'edit',
                        targetKey: currentEditData.key,
                        time: serverTimestamp()
                    });
                    cancelReply();
                } else {
                    let imageUrl = null;
                    if (pendingImageFile) {
                        showCustomModal({
                            type: 'loading',
                            title: '이미지 처리 중...',
                            text: '이미지를 압축하고 서버에 업로드하고 있습니다.'
                        });
                        const compressedBlob = await compressImage(pendingImageFile);
                        const fileName = `img_${Date.now()}.webp`;
                        const storageRef = sRef(storage, `chats/${currentRoomId}/${fileName}`);
                        const snapshot = await uploadBytes(storageRef, compressedBlob);
                        imageUrl = await getDownloadURL(snapshot.ref);
                        removeImage();
                    }

                    input.value = '';
                    const chatRef = ref(db, 'chats/' + currentRoomId);
                    const payload = {
                        uid: user.uid,
                        nick: myNick,
                        text: text,
                        time: serverTimestamp()
                    };
                    if (imageUrl) payload.imageUrl = imageUrl;
                    if (currentReplyData) {
                        payload.replyTo = currentReplyData;
                        cancelReply();
                    }
                    await push(chatRef, payload);
                }
            } catch (e) {
                console.error("전송 에러:", e);
                alert("전송 실패: " + e.message);
                if (text) input.value = text;
            } finally {
                hideCustomModal();
                btn.disabled = false;
                btn.style.opacity = '1';
                input.focus();
                isSending = false;
            }
        };

        function escapeHtml(text) {
            if (!text) return "";
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        document.getElementById('api-key-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.handleKeyLogin();
        });

        document.getElementById('nickname-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('api-key-input').focus();

        /* --- Workspace Drawer Functions --- */
        window.toggleDrawer = () => {
            const drawer = document.getElementById('lab-drawer');
            const backdrop = document.getElementById('drawer-backdrop');
            
            if (drawer.classList.contains('open')) {
                drawer.classList.remove('open');
                backdrop.classList.remove('show');
            } else {
                drawer.classList.add('open');
                backdrop.classList.add('show');
                refreshActiveDrawerTab();
            }
        };

        window.switchDrawerTab = (tabId) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById('drawer-tab-' + tabId).classList.add('active');
            
            if (tabId === 'album') window.renderAlbum();
            if (tabId === 'links') window.renderLinks();

        function refreshActiveDrawerTab() {
            const activeTab = document.querySelector('.tab-btn.active');
            if (activeTab) {
                if (activeTab.innerText === '앨범') window.renderAlbum();
                if (activeTab.innerText === '링크') window.renderLinks();

                    window.renderSearchResults(document.getElementById('drawer-search-input').value.trim().toLowerCase());
                }
            }
        }

        window.handleSearchInput = (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim().toLowerCase();
            searchTimeout = setTimeout(() => window.renderSearchResults(query), 150);
        };

        function highlightText(text, query) {
            if (!query) return escapeHtml(text);
            const escapedText = escapeHtml(text);
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return escapedText.replace(new RegExp(`(${escapedQuery})`, 'gi'), '<span class="highlight">$1</span>');
        }

        window.renderSearchResults = (query) => {
            const container = document.getElementById('search-results-container');
            container.innerHTML = '';
            if (!query) return;
            
            const matches = window.globalChatData.filter(item => {
                const text = editsState[item.key] ? editsState[item.key].text : item.data.text;
                return text && text !== 'reaction' && text.toLowerCase().includes(query);
            });
            
            if (matches.length === 0) {
                container.innerHTML = '<div style="font-size:12px; color:var(--sub-text-color); text-align:center; margin-top:20px;">일치하는 결과가 없습니다.</div>';
                return;
            }[...matches].reverse().forEach(item => {
                const text = editsState[item.key] ? editsState[item.key].text : item.data.text;
                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.onclick = () => window.scrollToMessage(item.key);
                div.innerHTML = `<div class="sr-nick">${escapeHtml(formatDisplayNick(item.data.nick))}</div><div class="sr-text">${highlightText(text, query)}</div>`;
                container.appendChild(div);
            });
        };

        window.renderAlbum = () => {
            const grid = document.getElementById('album-grid');
            const now = Date.now();
            grid.innerHTML = '';
            
            const mediaItems = window.globalChatData.filter(m => m.data.imageUrl);
            
            [...mediaItems].reverse().forEach(item => {
                const time = item.data.time || 0;
                const isExpired = (now - time >= 604800000); // 7 days
                
                const container = document.createElement('div');
                container.className = 'album-item-container';
                
                if (!isExpired) {
                    container.onclick = () => window.scrollToMessage(item.key);
                }
                
                if (isExpired) {
                    container.classList.add('expired-asset');
                    const img = document.createElement('img');
                    img.className = 'album-img loaded';
                    img.src = fallbackImageSvg;
                    img.style.cursor = 'default';
                    
                    const badge = document.createElement('div');
                    badge.className = 'badge-expired';
                    badge.innerText = '만료됨';
                    
                    container.appendChild(img);
                    container.appendChild(badge);
                } else {
                    const spinner = document.createElement('div');
                    spinner.className = 'img-loading-spinner';
                    
                    const img = document.createElement('img');
                    img.className = 'album-img';
                    img.src = item.data.imageUrl;
                    img.loading = 'lazy';
                    
                    img.onload = () => {
                        spinner.style.display = 'none';
                        img.classList.add('loaded');
                    };
                    img.onerror = () => window.handleAlbumImageError(img, time);
                    
                    container.appendChild(spinner);
                    container.appendChild(img);
                }
                grid.appendChild(container);
            });
        };

        window.renderLinks = () => {
            const list = document.getElementById('links-list');
            list.innerHTML = '';
            
            const urlRegex = /(?:https?:\/\/|www\.)[^\s<]+|\b[a-zA-Z0-9.-]+\.(?:com|net|org|kr|co|io|me|info|edu|gov|tv|biz|ai|dev|app|site|shop|wiki|xyz)\b(?:\/[^\s<]*)?/gi;
            const renderedLinks = new Set();
            
            window.globalChatData.slice().reverse().forEach(item => {
                const text = editsState[item.key] ? editsState[item.key].text : item.data.text;
                if (!text || text === 'reaction') return;
                
                const links = text.match(urlRegex);
                if (links) {
                    links.forEach(url => {
                        let href = (!url.toLowerCase().startsWith('http://') && !url.toLowerCase().startsWith('https://')) ? 'https://' + url : url;
                        const safeHref = href.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                        const cardKey = item.key + "_" + href;
                        
                        if (renderedLinks.has(cardKey)) return;
                        renderedLinks.add(cardKey);
                        
                        const card = document.createElement('div');
                        card.className = 'link-card';
                        card.innerHTML = `
                            <div class="link-url" onclick="handleLinkClick(event, '${safeHref}')">${escapeHtml(url)}</div>
                            <div class="link-context">"${escapeHtml(text)}"</div>
                            <button class="btn-jump-link" onclick="scrollToMessage('${item.key}')">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
                                대화 위치 보기
                            </button>
                        `;
                        list.appendChild(card);
                    });
                }
            });
        };

        /* --- Deep Jump & Contextual Loading Logic --- */
        function triggerFlash(row) {
            row.classList.remove('flash-active'); 
            void row.offsetWidth; 
            row.classList.add('flash-active');
            setTimeout(() => row.classList.remove('flash-active'), 2000);
        }

        window.scrollToMessage = async (key) => {
            let rowInMain = document.getElementById('chat-area').querySelector(`.msg-row[data-key="${key}"]`);
            
            if (!isJumpActive) {
                preJumpScrollTop = document.getElementById('chat-area').scrollTop;
                isJumpActive = true;
            }

            if (window.innerWidth < 800) {
                window.toggleDrawer();
            }

            if (!rowInMain) {
                showCustomModal({
                    type: 'loading',
                    title: '메시지 탐색 중...',
                    text: '해당 메시지 위치까지 과거 대화를 불러오고 있습니다.'
                });

                while (hasMoreHistory && !rowInMain) {
                    await fetchHistoryChunk(200);
                    rowInMain = document.getElementById('chat-area').querySelector(`.msg-row[data-key="${key}"]`);
                }

                hideCustomModal();
            }

            if (rowInMain) {
                document.getElementById('chat-area-jump').classList.add('hidden');
                document.getElementById('chat-area').classList.remove('hidden');
                rowInMain.scrollIntoView({ behavior: 'smooth', block: 'center' });
                triggerFlash(rowInMain);
                document.getElementById('return-toast').classList.add('show');
            } else {
                showCustomModal({
                    type: 'danger',
                    title: '탐색 실패',
                    text: '해당 메시지를 불러올 수 없습니다.',
                    confirmText: '확인',
                    onConfirm: () => {
                        hideCustomModal();
                        window.returnToOriginalPosition();
                    }
                });
            }
        };

        window.returnToOriginalPosition = () => {
            isJumpActive = false;
            document.getElementById('chat-area-jump').classList.add('hidden');
            document.getElementById('chat-area-jump').innerHTML = ''; // clear memory for jump view
            document.getElementById('chat-area').classList.remove('hidden');
            document.getElementById('chat-area').scrollTo({ top: preJumpScrollTop, behavior: 'smooth' });
            document.getElementById('return-toast').classList.remove('show');
        };

        window.fetchAlbumChunk = async () => {
            const btn = document.getElementById('btn-fetch-album');
            let originalIcon = '';
            if (btn) {
                originalIcon = btn.innerHTML;
                btn.innerHTML = '<div class="loader-spinner" style="width:16px;height:16px;border-width:2px;"></div>';
                btn.disabled = true;
                btn.style.opacity = '1'; /* Keep opacity 1 so spinner is visible */
            }
            
            await fetchHistoryChunk(500);
            refreshActiveDrawerTab();
            
            if (btn) {
                btn.innerHTML = originalIcon;
                btn.disabled = !hasMoreHistory;
                btn.style.opacity = hasMoreHistory ? '1' : '0.2';
            }
        };

        window.fetchLinkChunk7Days = async () => {
            const btn = document.getElementById('btn-fetch-links');
            let originalIcon = '';
            if (btn) {
                originalIcon = btn.innerHTML;
                btn.innerHTML = '<div class="loader-spinner" style="width:16px;height:16px;border-width:2px;"></div>';
                btn.disabled = true;
                btn.style.opacity = '1';
            }
            
            if (oldestMessageTime) {
                const targetTime = oldestMessageTime - (7 * 24 * 60 * 60 * 1000);
                
                while (hasMoreHistory && oldestMessageTime > targetTime) {
                    const success = await fetchHistoryChunk(200);
                    if (!success) break;
                }
                refreshActiveDrawerTab();
            }
            
            if (btn) {
                btn.innerHTML = originalIcon;
                btn.disabled = !hasMoreHistory;
                btn.style.opacity = hasMoreHistory ? '1' : '0.2';
            }
        };

    </script>

    <script>
        // QR Scanner Module
        let html5QrcodeScanner = null;

        function startQrScan() {
            const readerDiv = document.getElementById('reader');
            const stopBtn = document.getElementById('btn-stop-scan');
            readerDiv.style.display = "block";
            stopBtn.style.display = "inline-block";
            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
                .catch(err => {
                    alert("카메라를 시작할 수 없습니다.");
                    stopQrScan();
                });
        }

        function scanFromFile(input) {
            if (input.files.length === 0) return;
            const file = input.files[0];

            const img = new Image();
            const url = URL.createObjectURL(file);

            img.onload = () => {
                URL.revokeObjectURL(url);

                const canvas = document.createElement('canvas');
                const padding = 40;

                canvas.width = img.width + padding * 2;
                canvas.height = img.height + padding * 2;

                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, padding, padding, img.width, img.height);

                canvas.toBlob((blob) => {
                    if (!blob) {
                        alert("이미지 처리 중 오류가 발생했습니다.");
                        input.value = '';
                        return;
                    }

                    const paddedFile = new File([blob], "padded_qr.png", { type: "image/png" });
                    const html5QrCode = new Html5Qrcode("reader");

                    html5QrCode.scanFile(paddedFile, true)
                        .then(onScanSuccess)
                        .catch(err => {
                            alert("QR 코드를 찾을 수 없습니다.");
                            input.value = '';
                        });
                }, 'image/png');
            };
            img.src = url;
        }

        function onScanSuccess(decodedText) {
            const keyInput = document.getElementById('api-key-input');
            keyInput.value = decodedText;
            stopQrScan();
            keyInput.focus();
        }

        function stopQrScan() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                }).catch(err => console.log(err));
            }
            document.getElementById('reader').style.display = "none";
            document.getElementById('btn-stop-scan').style.display = "none";
        }
    </script>
</body>
